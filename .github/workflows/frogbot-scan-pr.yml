name: "Frogbot Scan Repository"
on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches:
      - main
permissions:
  pull-requests: write
  contents: write
  security-events: write

jobs:
  scan-repository:
    runs-on: self-hosted
    name: Scan Repository (${{ matrix.branch }} branch)
    strategy:
      matrix:
        branch: [ "main" ]
    steps:
      # 1. Check out the repository onto your self-hosted runner
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}

      # 2. Ensure Node.js and npm are available
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Change to your project's node version

      # 3. Run the installation before the scan
      - name: Install Dependencies
        run: npm install

      # 4. Execute Frogbot Scan on the local, populated workspace
      - uses: jfrog/frogbot@v3
        env:
          JF_URL: ${{ secrets.JF_URL }}
          JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}
          JF_GIT_BASE_BRANCH: ${{ matrix.branch }}
          JF_GIT_TOKEN: ${{ secrets.JF_GITHUB_TOKEN }}
          # CRITICAL: Forces Frogbot to read the node_modules you just installed
          JF_USE_LOCAL_REPOSITORY: true 
          CI: true
          JFROG_CLI_LOG_LEVEL: DEBUG
