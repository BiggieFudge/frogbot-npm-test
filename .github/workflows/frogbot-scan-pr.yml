name: "Frogbot Scan Repository"
on:
  workflow_dispatch:
  schedule:
    # The repository will be scanned once a day at 00:00 GMT.
    - cron: "0 0 * * *"
  push:
    branches:
      - main
permissions:
  pull-requests: write
  contents: write
  security-events: write

jobs:
  scan-repository:
    runs-on: self-hosted
    name: Scan Repository (${{ matrix.branch }} branch)
    strategy:
      matrix:
        branch: [ "main" ]
    steps:
      # 1. Explicitly check out the repository to the self-hosted runner workspace
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}

      # 2. Ensure Node.js is present for the npm install command
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Adjust this to match your runtime requirement

      # 3. Pull the latest Frogbot script via curl and run the scan
      - name: Download and Execute Frogbot
        env:
          # Your JFrog & GitHub Authorization Tokens
          JF_URL: ${{ secrets.JF_URL }}
          JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}
          JF_GIT_BASE_BRANCH: ${{ matrix.branch }}
          JF_GIT_TOKEN: ${{ secrets.JF_GITHUB_TOKEN }}
          
          # Crucial Flags for Dependencies & Local Workspaces
          JF_USE_LOCAL_REPOSITORY: true
          JF_INSTALL_DEPS_CMD: "npm install"
          
          # Debugging & General Environment Controls
          CI: true
          JFROG_CLI_LOG_LEVEL: DEBUG
        run: |
          curl -fL "https://releases.jfrog.io/artifactory/frogbot/v3/[RELEASE]/getFrogbot.sh" | sh
          ./frogbot scan-repository
